name: "Conga Engineering Policy"
version: "1.0.0"
enforcement: block         # warn | block | off

# when depenendies are changed client can force refresh using, apm policy status --no-cache
cache:
  ttl: 3600                     # Policy cache TTL in seconds

dependencies:
  allow:
    - "congaengr/**"
    - "microsoft/*"
    - "abuttaro-conga/**"
    - "mattpocock/skills"
    - "juliusbrussee/caveman/**"
    - "juliusbrussee/caveman"
  # deny:
  #   - "untrusted-org/**"

mcp:
  transport:
    allow: [http, stdio]   # explicit allow list: blocks sse and streamable-http
